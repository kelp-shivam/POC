services:
  # Backend API (FastAPI)
  - type: web
    name: docextract-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn mineru_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MINERU_API_KEY
        sync: false
      - key: api_key_1
        sync: false
      - key: api_key_2
        sync: false
      - key: api_key_3
        sync: false
      - key: api_key_4
        sync: false
      # LlamaParse (optional)
      - key: LLAMAPARSE_API_KEY
        sync: false
      # Azure Document Intelligence (optional)
      - key: AZURE_DI_ENDPOINT
        sync: false
      - key: AZURE_DI_KEY
        sync: false
      - key: AZURE_DI_PROJECT
        sync: false
      # Azure OpenAI Foundry (GPT-4o mini - enrichment)
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-mini
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-02-15"
      # To use OpenAI direct:
      # - key: LLM_PROVIDER
      #   value: openai
      # - key: OPENAI_API_KEY
      #   sync: false
      # To use Kimi HPC-AI:
      # - key: LLM_PROVIDER
      #   value: kimi
      # (needs api_key_1, api_key_2, etc.)

  # Frontend (Streamlit)
  - type: web
    name: docextract-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: DOCEXTRACT_BRIDGE_URL
        sync: false
